<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Painel de Demandas — Gestão de Processos</title>
<style>
:root{
  --bg:#0f172a; --panel:#ffffff; --ink:#0f172a; --muted:#64748b; --line:#e2e8f0;
  --accent:#2563eb; --overdue:#dc2626; --priority:#ea580c; --blocked:#7c3aed;
  --soon:#0ea5e9; --none:#94a3b8; --done:#16a34a; --soft:#f8fafc;
  color-scheme:light;
}
*{box-sizing:border-box}
body{margin:0;font-family:'Segoe UI',system-ui,-apple-system,Roboto,Arial,sans-serif;background:#eef2f7;color:var(--ink);}
#gate{position:fixed;inset:0;background:linear-gradient(135deg,#0f172a,#1e293b);display:flex;align-items:center;justify-content:center;z-index:1000;}
#gate .box{background:#fff;border-radius:16px;padding:36px 32px;width:340px;max-width:90vw;box-shadow:0 20px 50px rgba(0,0,0,.35);text-align:center;}
#gate h1{font-size:18px;margin:0 0 6px;color:#0f172a}
#gate p{font-size:13px;color:#64748b;margin:0 0 20px}
#gate input{width:100%;padding:11px 12px;border:1px solid #cbd5e1;border-radius:9px;font-size:14px;margin-bottom:12px}
#gate button{width:100%;padding:11px;border:0;border-radius:9px;background:#2563eb;color:#fff;font-size:14px;font-weight:600;cursor:pointer}
#gate .err{color:#dc2626;font-size:12px;height:16px;margin-top:8px}
#app{display:none;max-width:1180px;margin:0 auto;padding:22px 18px 60px}
header.top{display:flex;flex-wrap:wrap;align-items:flex-end;justify-content:space-between;gap:10px;margin-bottom:8px}
header.top h1{font-size:22px;margin:0}
header.top .sub{color:var(--muted);font-size:13px;margin-top:3px}
.snapinfo{font-size:12px;color:var(--muted);background:#fff;border:1px solid var(--line);border-radius:999px;padding:6px 12px}
.tabs{display:flex;gap:6px;margin:18px 0 14px;border-bottom:2px solid var(--line)}
.tab{padding:10px 18px;cursor:pointer;font-size:14px;font-weight:600;color:var(--muted);border-bottom:3px solid transparent;margin-bottom:-2px}
.tab.active{color:var(--accent);border-color:var(--accent)}
.tab .cnt{font-size:11px;background:#e2e8f0;color:#475569;border-radius:999px;padding:1px 8px;margin-left:6px}
.kpis{display:grid;grid-template-columns:repeat(6,1fr);gap:10px;margin-bottom:16px}
.kpi{background:#fff;border:1px solid var(--line);border-radius:12px;padding:12px 14px}
.kpi .n{font-size:24px;font-weight:700;line-height:1}
.kpi .l{font-size:11px;color:var(--muted);margin-top:5px;text-transform:uppercase;letter-spacing:.03em}
.kpi.b-overdue .n{color:var(--overdue)} .kpi.b-priority .n{color:var(--priority)}
.kpi.b-blocked .n{color:var(--blocked)} .kpi.b-soon .n{color:var(--soon)}
.kpi.b-done .n{color:var(--done)} .kpi.b-total .n{color:var(--ink)}
.filters{display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin-bottom:14px}
.chip{border:1px solid var(--line);background:#fff;border-radius:999px;padding:6px 13px;font-size:12.5px;cursor:pointer;color:#475569;font-weight:600;user-select:none}
.chip.active{background:var(--accent);border-color:var(--accent);color:#fff}
.chip.cat.active[data-cat=overdue]{background:var(--overdue);border-color:var(--overdue)}
.chip.cat.active[data-cat=priority]{background:var(--priority);border-color:var(--priority)}
.chip.cat.active[data-cat=blocked]{background:var(--blocked);border-color:var(--blocked)}
.chip.cat.active[data-cat=soon]{background:var(--soon);border-color:var(--soon)}
.chip.cat.active[data-cat=none]{background:var(--none);border-color:var(--none)}
.chip.cat.active[data-cat=done]{background:var(--done);border-color:var(--done)}
.sep{width:1px;height:22px;background:var(--line);margin:0 4px}
#search{margin-left:auto;padding:8px 12px;border:1px solid var(--line);border-radius:9px;font-size:13px;min-width:220px}
.group{margin-bottom:18px}
.group h3{font-size:13px;text-transform:uppercase;letter-spacing:.04em;color:var(--muted);margin:0 0 8px;display:flex;align-items:center;gap:8px}
.group h3 .dot{width:9px;height:9px;border-radius:50%}
.card{background:#fff;border:1px solid var(--line);border-left:4px solid var(--none);border-radius:10px;padding:11px 14px;margin-bottom:7px;display:flex;justify-content:space-between;gap:14px;align-items:flex-start}
.card.overdue{border-left-color:var(--overdue)} .card.priority{border-left-color:var(--priority)}
.card.blocked{border-left-color:var(--blocked)} .card.soon{border-left-color:var(--soon)}
.card.none{border-left-color:var(--none)} .card.done{border-left-color:var(--done)}
.card .name{font-size:14px;font-weight:600;color:#0f172a;text-decoration:none;line-height:1.35}
.card .name:hover{color:var(--accent)}
.card .meta{font-size:12px;color:var(--muted);margin-top:4px;display:flex;flex-wrap:wrap;gap:5px 12px}
.card .parent{color:#94a3b8;font-style:italic}
.card.done .name{color:#64748b;text-decoration:line-through}
.badge{font-size:11px;font-weight:700;padding:2px 9px;border-radius:999px;white-space:nowrap}
.badge.m-Rodrigo{background:#dbeafe;color:#1d4ed8}
.badge.m-Danielle{background:#fce7f3;color:#be185d}
.badge.m-Raul{background:#dcfce7;color:#15803d}
.badge.m-Poliana{background:#fef9c3;color:#a16207}
.right{display:flex;flex-direction:column;align-items:flex-end;gap:6px;flex-shrink:0}
.due{font-size:12px;font-weight:600;color:#475569;white-space:nowrap}
.due.late{color:var(--overdue)}
.empty{background:#fff;border:1px dashed var(--line);border-radius:10px;padding:26px;text-align:center;color:var(--muted);font-size:13px}
footer{margin-top:30px;text-align:center;color:#94a3b8;font-size:11px}
@media(max-width:820px){.kpis{grid-template-columns:repeat(3,1fr)}#search{margin-left:0;width:100%}}
</style>
</head>

var TODAY="2026-07-23", PLUS7="2026-07-30", CUT7="2026-07-30", CUT30="2026-06-23";

var TAB_DEFS=[{id:"processos",label:"Processos"},{id:"projetos",label:"Projetos"},{id:"rotinas",label:"Rotinas"}];
var CAT_DEFS=[
  {id:"overdue",label:"Atrasadas",color:"var(--overdue)"},
  {id:"priority",label:"Vence ≤ 7 dias",color:"var(--priority)"},
  {id:"blocked",label:"Bloqueadas",color:"var(--blocked)"},
  {id:"soon",label:"Em andamento",color:"var(--soon)"},
  {id:"none",label:"Sem prazo",color:"var(--none)"},
  {id:"done",label:"Concluídas (30d)",color:"var(--done)"}
];
var MEMBERS=["Rodrigo","Danielle","Raul"];

var state={tab:"processos",members:{},cats:{},q:""};
MEMBERS.forEach(function(m){state.members[m]=true;});
state.members["Poliana"]=true;
CAT_DEFS.forEach(function(c){state.cats[c.id]=(c.id!=="done");});

function fmtDate(d){ if(!d) return ""; var p=d.split("-"); return p[2]+"/"+p[1]; }

function catCount(tab,cat){
  return SNAP_TASKS.filter(function(t){return t.tab===tab && t.cat===cat;}).length;
}
function tabCountOpen(tab){
  return SNAP_TASKS.filter(function(t){return t.tab===tab && !t.completed;}).length;
}

function renderTabs(){
  var el=document.getElementById("tabs"); el.innerHTML="";
  TAB_DEFS.forEach(function(td){
    var d=document.createElement("div");
    d.className="tab"+(state.tab===td.id?" active":"");
    d.innerHTML=td.label+'<span class="cnt">'+tabCountOpen(td.id)+'</span>';
    d.onclick=function(){state.tab=td.id;renderAll();};
    el.appendChild(d);
  });
}

function renderKpis(){
  var el=document.getElementById("kpis"); el.innerHTML="";
  var tab=state.tab;
  var open=SNAP_TASKS.filter(function(t){return t.tab===tab && !t.completed;}).length;
  var cards=[
    {cls:"b-total",n:open,l:"Abertas"},
    {cls:"b-overdue",n:catCount(tab,"overdue"),l:"Atrasadas"},
    {cls:"b-priority",n:catCount(tab,"priority"),l:"Vence ≤ 7d"},
    {cls:"b-blocked",n:catCount(tab,"blocked"),l:"Bloqueadas"},
    {cls:"b-soon",n:catCount(tab,"soon"),l:"Em andamento"},
    {cls:"b-done",n:catCount(tab,"done"),l:"Concluídas 30d"}
  ];
  cards.forEach(function(c){
    var d=document.createElement("div"); d.className="kpi "+c.cls;
    d.innerHTML='<div class="n">'+c.n+'</div><div class="l">'+c.l+'</div>';
    el.appendChild(d);
  });
}

function renderFilters(){
  var el=document.getElementById("filters"); el.innerHTML="";
  MEMBERS.forEach(function(m){
    var c=document.createElement("div");
    c.className="chip"+(state.members[m]?" active":"");
    c.textContent=m;
    c.onclick=function(){state.members[m]=!state.members[m];renderAll();};
    el.appendChild(c);
  });
  var sep=document.createElement("div"); sep.className="sep"; el.appendChild(sep);
  CAT_DEFS.forEach(function(cd){
    var c=document.createElement("div");
    c.className="chip cat"+(state.cats[cd.id]?" active":"");
    c.setAttribute("data-cat",cd.id);
    c.textContent=cd.label;
    c.onclick=function(){state.cats[cd.id]=!state.cats[cd.id];renderAll();};
    el.appendChild(c);
  });
  var s=document.createElement("input");
  s.id="search"; s.type="search"; s.placeholder="Buscar tarefa..."; s.value=state.q;
  s.oninput=function(){state.q=s.value;renderList();};
  el.appendChild(s);
}

function passFilter(t){
  if(t.tab!==state.tab) return false;
  if(!state.cats[t.cat]) return false;
  if(t.member && state.members.hasOwnProperty(t.member)){ if(!state.members[t.member]) return false; }
  if(state.q){
    var q=state.q.toLowerCase();
    var hay=((t.name||"")+" "+(t.parent||"")+" "+(t.projName||"")).toLowerCase();
    if(hay.indexOf(q)<0) return false;
  }
  return true;
}

function renderList(){
  var el=document.getElementById("list"); el.innerHTML="";
  var order=["overdue","priority","blocked","soon","none","done"];
  var items=SNAP_TASKS.filter(passFilter);
  if(!items.length){ el.innerHTML='<div class="empty">Nenhuma tarefa para os filtros selecionados.</div>'; return; }
  order.forEach(function(cat){
    if(!state.cats[cat]) return;
    var arr=items.filter(function(t){return t.cat===cat;});
    if(!arr.length) return;
    arr.sort(function(a,b){
      var da=a.due_on||"9999-99-99", db=b.due_on||"9999-99-99";
      if(cat==="done"){ return (b.completed_at||"").localeCompare(a.completed_at||""); }
      return da.localeCompare(db);
    });
    var cd=CAT_DEFS.filter(function(c){return c.id===cat;})[0];
    var g=document.createElement("div"); g.className="group";
    var h=document.createElement("h3");
    h.innerHTML='<span class="dot" style="background:'+cd.color+'"></span>'+cd.label+' · '+arr.length;
    g.appendChild(h);
    arr.forEach(function(t){
      var card=document.createElement("div"); card.className="card "+t.cat;
      var left=document.createElement("div");
      var nameHtml='<a class="name" href="'+(t.url||"#")+'" target="_blank" rel="noopener">'+esc(t.name)+'</a>';
      var meta='<div class="meta">';
      meta+='<span>'+esc(t.projName||"")+'</span>';
      var sec=(t.memberships&&t.memberships[0]&&t.memberships[0].section)?t.memberships[0].section:null;
      if(sec) meta+='<span>· '+esc(sec)+'</span>';
      if(t.parent) meta+='<span class="parent">↳ '+esc(t.parent)+'</span>';
      if(t.start) meta+='<span>início '+fmtDate(t.start)+'</span>';
      meta+='</div>';
      left.innerHTML=nameHtml+meta;
      var right=document.createElement("div"); right.className="right";
      var mcls=(MEMBERS.indexOf(t.member)>=0||t.member==="Poliana")?("m-"+t.member):"";
      right.innerHTML='<span class="badge '+mcls+'">'+esc(t.member||"—")+'</span>';
      if(t.cat==="done"){
        right.innerHTML+='<span class="due">✓ '+fmtDate((t.completed_at||"").slice(0,10))+'</span>';
      } else if(t.due_on){
        var late=t.due_on<TODAY;
        right.innerHTML+='<span class="due'+(late?" late":"")+'">'+fmtDate(t.due_on)+'</span>';
      } else {
        right.innerHTML+='<span class="due">sem prazo</span>';
      }
      card.appendChild(left); card.appendChild(right);
      g.appendChild(card);
    });
    el.appendChild(g);
  });
}

function esc(s){ return String(s==null?"":s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }

function renderAll(){ renderTabs(); renderKpis(); renderFilters(); renderList(); }

(function(){
  var gate=document.getElementById("gate"), app=document.getElementById("app");
  function tryEnter(){
    var v=document.getElementById("pw").value;
    if(v==="casadofitness"){ gate.style.display="none"; app.style.display="block"; renderAll(); }
    else { document.getElementById("err").textContent="Senha incorreta."; }
  }
  document.getElementById("enter").onclick=tryEnter;
  document.getElementById("pw").addEventListener("keydown",function(e){ if(e.key==="Enter") tryEnter(); });
})();
</script>
