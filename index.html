let TASKS = [];
let activeTab = 'geral';
let filter = 'all';
let openCat = 'overdue';
let chart = null;
let LOAD_ERRORS = [];
let expanded = new Set();      // gids expandidos na árvore de detalhamento
let expandedProg = new Set();  // gids expandidos na árvore de programação

const CATS = [
  { key:'overdue',  lbl:'Atrasadas',          cls:'c-over', dot:'d-over', tc:'t-over', hint:'Prazo vencido' },
  { key:'priority', lbl:'Prioridades',        cls:'c-prio', dot:'d-prio', tc:'t-prio', hint:'Vence em até 7 dias' },
  { key:'soon',     lbl:'No prazo / futuras', cls:'c-soon', dot:'d-soon', tc:'t-soon', hint:'Prazo a partir de 8 dias' },
  { key:'none',     lbl:'Sem prazo',          cls:'c-none', dot:'d-none', tc:'t-none', hint:'Sem data definida' },
  { key:'done',     lbl:'Concluídas',         cls:'c-done', dot:'d-done', tc:'t-done', hint:'Últimos 7 dias' },
];

function load(){
  TASKS = SNAP_TASKS.slice();
  autoExpand(); autoExpandProg(); render();
  var el=document.getElementById('updated'); if(el) el.textContent='Snapshot de 22/07/2026 — dados congelados (não atualiza sozinho)';
}

function tabData(){
  if (activeTab === 'geral'){ const seen = new Set(); return TASKS.filter(t => seen.has(t.gid) ? false : seen.add(t.gid)); }
  return TASKS.filter(t => t.tab === activeTab);
}
function current(){ const d = tabData(); return filter==='all' ? d : d.filter(t => t.member===filter); }
function countBy(list, key){ return list.filter(t => t.cat===key).length; }
function startSoon(list){ return list.filter(t => !t.completed && t.start && t.start >= TODAY && t.start <= PLUS7); }

function render(){
  const td = tabData();
  const data = current();
  const tab = TABS.find(t => t.key===activeTab);

  let html = '';
  if (LOAD_ERRORS.length){ html += `<div class="warn">⚠ Falha ao carregar: ${LOAD_ERRORS.map(escapeHtml).join('; ')} (instabilidade do Asana). Clique em Recarregar em instantes.</div>`; }

  html += '<div class="tabs">';
  TABS.forEach(t => html += `<button class="tab ${activeTab===t.key?'active':''}" data-tab="${t.key}">${t.label}</button>`);
  html += '</div>';
  html += `<div class="tabdesc">${escapeHtml(tab.desc)}</div>`;

  // resumo por responsável
  html += '<div class="sech">Resumo por responsável</div>';
  html += '<table class="mtable"><thead><tr><th class="name" style="text-align:left">Responsável</th>';
  CATS.forEach(c => html += `<th>${c.lbl}</th>`);
  html += '<th>Em aberto</th><th>Inicia ≤7d</th></tr></thead><tbody>';
  MEMBERS.forEach(m => {
    const list = td.filter(t => t.member===m.short);
    html += `<tr><td class="name">${m.short}</td>`;
    CATS.forEach(c => { const n = countBy(list, c.key); html += `<td class="clk" data-m="${m.short}" data-c="${c.key}"><span class="cell-n ${n?c.tc:'t-zero'}">${n}</span></td>`; });
    html += `<td><span class="cell-n">${list.filter(t=>t.cat!=='done').length}</span></td>`;
    const ns = startSoon(list).length;
    html += `<td><span class="cell-n ${ns?'t-start':'t-zero'}">${ns}</span></td></tr>`;
  });
  html += '<tr class="tot"><td class="name">Total</td>';
  CATS.forEach(c => { const n = countBy(td, c.key); html += `<td><span class="cell-n ${n?c.tc:'t-zero'}">${n}</span></td>`; });
  html += `<td><span class="cell-n">${td.filter(t=>t.cat!=='done').length}</span></td>`;
  html += `<td><span class="cell-n ${startSoon(td).length?'t-start':'t-zero'}">${startSoon(td).length}</span></td></tr>`;
  html += '</tbody></table>';

  // filtros
  html += '<div class="filters">';
  html += `<button class="fbtn ${filter==='all'?'active':''}" data-f="all">Todos</button>`;
  MEMBERS.forEach(m => html += `<button class="fbtn ${filter===m.short?'active':''}" data-f="${m.short}">${m.short}</button>`);
  html += '</div>';

  // cards
  html += '<div class="cards">';
  CATS.forEach(c => {
    html += `<div class="card ${c.cls} ${openCat===c.key?'open':''}" data-cat="${c.key}">${activeTab==='geral'?'':'<span class="chev">▼</span>'}<div class="lbl"><span class="dot ${c.dot}"></span>${c.lbl}</div><div class="num">${countBy(data, c.key)}</div><div class="hint">${c.hint}</div></div>`;
  });
  html += '</div>';

  const isGeral = activeTab === 'geral';

  // Projeção de carga (heatmap) — sempre presente
  html += `<div class="chartbox"><h3>Projeção de carga — itens por responsável / mês / projeto${isGeral?'' : ' · '+escapeHtml(tab.label)}</h3>
    <div class="lp-sub">Cada célula = itens em aberto (tarefa/subtarefa) cuja janela <b>Data de Início → conclusão</b> atravessa o mês. Mapa de calor: <b style="color:#1f8a4d">verde ≤2</b> · <b style="color:#b5860f">amarelo 3–5</b> · <b style="color:#c2560f">laranja &gt;5</b>. <b style="color:#c0392b">Vencidas</b> em vermelho. Itens sem data (backlog) ficam fora do cálculo.</div>
    <div id="loadtable"></div></div>`;

  // Detalhamento hierárquico e Programação — apenas nas abas de projeto (não na Geral)
  if (!isGeral){
    html += `<div class="detail">
      <div class="detbar"><div id="deth"></div>
        <div class="detbtns"><button class="lnk" id="catAll">Ver todas</button><button class="lnk" id="expAll">Expandir tudo</button><button class="lnk" id="colAll">Recolher tudo</button></div>
      </div>
      <div id="dettree"></div>
    </div>`;
    html += `<div class="prog"><h3>Programação da semana — inicia ou vence nos próximos 7 dias (até ${fmtDate(PLUS7)})</h3><div id="proglist"></div></div>`;
  }

  if (isGeral){
    html += `<div class="foot">Visão consolidada dos 4 projetos para monitoramento. Os <b>cartões</b> e a tabela de resumo mostram os indicadores por responsável; a <b>projeção de carga</b> antecipa onde o trabalho se concentra nos próximos meses. Para ver o detalhamento das tarefas, abra a aba do projeto.</div>`;
  } else {
    html += `<div class="foot"><b>Critérios:</b> "Prioridades" = em aberto vencendo em até 7 dias (até ${fmtDate(PLUS7)}). "Atrasadas" = prazo anterior a hoje. "Concluídas" = últimos 7 dias. O <b>detalhamento hierárquico</b> mostra Nível 1 (demanda) › 2 (subtarefa) › 3 (sub da sub) — use as setas ▸. A <b>programação</b> traz o que inicia ou vence em 7 dias. Itens em cinza são contexto (a origem/pai do destacado).</div>`;
  }

  document.getElementById('content').innerHTML = html;

  document.querySelectorAll('.tab').forEach(b => b.onclick = () => { activeTab=b.dataset.tab; filter='all'; autoExpand(); autoExpandProg(); render(); });
  document.querySelectorAll('.fbtn').forEach(b => b.onclick = () => { filter=b.dataset.f; render(); });
  document.querySelectorAll('.card').forEach(c => c.onclick = () => { openCat=c.dataset.cat; autoExpand(); render(); const d=document.querySelector('.detail'); if(d) d.scrollIntoView({behavior:'smooth', block:'nearest'}); });
  document.querySelectorAll('.mtable td.clk').forEach(cell => cell.onclick = () => { filter = cell.dataset.m; openCat = cell.dataset.c; autoExpand(); render(); const d=document.querySelector('.detail'); if(d) d.scrollIntoView({behavior:'smooth', block:'center'}); });
  const bAll=document.getElementById('catAll'); if(bAll) bAll.onclick=()=>{ openCat='all'; render(); };
  const bExp=document.getElementById('expAll'); if(bExp) bExp.onclick=()=>{ expandAll(); render(); };
  const bCol=document.getElementById('colAll'); if(bCol) bCol.onclick=()=>{ expanded.clear(); render(); };

  if (!isGeral){ renderTree(td); renderProg(td); }
  renderLoad(td);
}

function locHtml(t){
  let out = '';
  if (t.parent) out += `<div class="loc sub">↳ subtarefa de: ${escapeHtml(t.parent)}</div>`;
  if (t.memberships && t.memberships.length){
    t.memberships.forEach(m => { const p = escapeHtml(m.project || '—'); const s = m.section ? ` <span class="sep">›</span> ${escapeHtml(m.section)}` : ''; out += `<div class="loc">${p}${s}</div>`; });
  } else if (!t.parent){ out += `<div class="loc muted">Sem projeto vinculado</div>`; }
  return out;
}

// ===== Árvore hierárquica (Nível 1 › 2 › 3) =====
function treeOf(scope){
  const byGid = {}, kids = {};
  scope.forEach(t => byGid[t.gid] = t);
  const roots = [];
  scope.forEach(t => {
    if (t.parentGid && byGid[t.parentGid]) (kids[t.parentGid] = kids[t.parentGid] || []).push(t);
    else roots.push(t);
  });
  return { byGid, kids, roots };
}
function isMatch(t){ return (filter==='all' || t.member===filter) && (openCat==='all' || t.cat===openCat); }
function weekMatch(t){ return !t.completed && (filter==='all' || t.member===filter) && ((t.start && t.start>=TODAY && t.start<=PLUS7) || (t.due_on && t.due_on>=TODAY && t.due_on<=PLUS7)); }
function branchHasMatch(t, kids, memo, matchFn){
  if (memo.has(t.gid)) return memo.get(t.gid);
  let m = matchFn(t);
  (kids[t.gid]||[]).forEach(c => { if (branchHasMatch(c, kids, memo, matchFn)) m = true; });
  memo.set(t.gid, m); return m;
}
function seedExpand(matchFn){
  const { kids, roots } = treeOf(tabData());
  const memo = new Map(); roots.forEach(r => branchHasMatch(r, kids, memo, matchFn));
  const set = new Set();
  tabData().forEach(t => { if ((kids[t.gid]||[]).length && branchHasMatch(t, kids, memo, matchFn)) set.add(t.gid); });
  return set;
}
function autoExpand(){ expanded = seedExpand(isMatch); }
function autoExpandProg(){ expandedProg = seedExpand(weekMatch); }
function expandAll(){ const { kids } = treeOf(tabData()); expanded = new Set(Object.keys(kids)); }

const DOTCLS = { overdue:'d-over', priority:'d-prio', soon:'d-soon', none:'d-none', done:'d-done' };
function nodeHtml(t, kids, memo, depth, ctx){
  if (!branchHasMatch(t, kids, memo, ctx.matchFn)) return '';
  const ch = (kids[t.gid]||[]).filter(c => branchHasMatch(c, kids, memo, ctx.matchFn));
  const hasKids = ch.length > 0;
  const open = ctx.expSet.has(t.gid);
  const arrow = hasKids
    ? `<span class="tarrow" data-tgid="${t.gid}">${open?'▾':'▸'}</span>`
    : `<span class="tarrow leaf">·</span>`;
  const startChip = (ctx.showStart && t.start) ? `<span class="tmeta startc">início ${fmtDate(t.start)}</span>` : '';
  let meta = '';
  if (t.completed) meta = t.completed_at ? `<span class="tmeta ok">✓ ${fmtDate(t.completed_at.slice(0,10))}</span>` : '';
  else if (t.due_on){ const late = t.due_on < TODAY; meta = `<span class="tmeta ${late?'late':'ok'}">${late ? fmtDate(t.due_on)+' · atrasada' : 'vence '+fmtDate(t.due_on)}</span>`; }
  else meta = `<span class="tmeta muted">sem prazo</span>`;
  const nlvl = Math.min(depth+1, 3);
  const origin = (depth===0 && t.memberships && t.memberships[0] && t.memberships[0].section)
    ? `<span class="torigin">${escapeHtml(t.memberships[0].section)}</span>` : '';
  let html = `<div class="trow ${ctx.matchFn(t)?'':'ctx'}" style="padding-left:${8+depth*22}px">`
    + arrow
    + `<span class="tdot ${DOTCLS[t.cat]}"></span>`
    + `<span class="lvl lvl${nlvl}">N${nlvl}</span>`
    + `<a class="tname" href="${t.url}" target="_blank" rel="noopener">${escapeHtml(t.name)}</a>`
    + `<span class="twho">${escapeHtml(t.member)}</span>${startChip}${meta}${origin}`
    + `</div>`;
  if (hasKids && open){ ch.sort((a,b)=>(a.due_on||'9999').localeCompare(b.due_on||'9999')); ch.forEach(c => html += nodeHtml(c, kids, memo, depth+1, ctx)); }
  return html;
}
function renderTreeInto(containerId, td, ctx){
  const { kids, roots } = treeOf(td);
  const memo = new Map(); roots.forEach(r => branchHasMatch(r, kids, memo, ctx.matchFn));
  const visRoots = roots.filter(r => branchHasMatch(r, kids, memo, ctx.matchFn))
    .sort((a,b)=>(a.due_on||'9999').localeCompare(b.due_on||'9999'));
  const el = document.getElementById(containerId);
  if (!visRoots.length){ el.innerHTML = `<div class="empty">${ctx.empty || 'Nenhuma tarefa nesta seleção.'}</div>`; return; }
  el.innerHTML = visRoots.map(r => nodeHtml(r, kids, memo, 0, ctx)).join('');
  el.querySelectorAll('.tarrow[data-tgid]').forEach(a => a.onclick = (e) => {
    e.preventDefault(); const g = a.dataset.tgid;
    if (ctx.expSet.has(g)) ctx.expSet.delete(g); else ctx.expSet.add(g);
    render();
  });
}
function renderTree(td){
  const catLbl = openCat==='all' ? 'Todas as categorias' : CATS.find(c=>c.key===openCat).lbl;
  const nMatch = td.filter(isMatch).length;
  document.getElementById('deth').innerHTML = `<b>Detalhamento hierárquico</b> · ${escapeHtml(catLbl)}${filter!=='all'?' · '+escapeHtml(filter):''} <span class="dcount">${nMatch} em destaque</span>`;
  renderTreeInto('dettree', td, { matchFn: isMatch, expSet: expanded, showStart: false });
}

function renderProg(td){
  renderTreeInto('proglist', td, { matchFn: weekMatch, expSet: expandedProg, showStart: true, empty: 'Nada inicia ou vence nos próximos 7 dias.' });
}

const MESES = ['jan','fev','mar','abr','mai','jun','jul','ago','set','out','nov','dez'];
const PROJ_ORDER = ['Processos Críticos v2.0','Processos de Apoio','Jurídico','Pipeline de Processos'];
function heatCls(n){ return n<=0 ? '' : (n<=2 ? 'heat-g' : (n<=5 ? 'heat-y' : 'heat-o')); }
function firstDay(y,m){ return ymd(new Date(y,m,1)); }
function lastDay(y,m){ return ymd(new Date(y,m+1,0)); }
// Projeção de carga: heatmap por responsável × mês × projeto.
// Cada item conta em todo mês cuja janela (Data de Início → conclusão) atravessa o mês.
function renderLoad(td){
  const now = new Date(); const curY = now.getFullYear(), curM = now.getMonth();
  const cols = [];
  for (let i = 0; i < 6; i++){ const d = new Date(curY, curM + i, 1); cols.push({ label: (MESES[d.getMonth()]+'/'+String(d.getFullYear()).slice(2)).toUpperCase(), ms: firstDay(d.getFullYear(), d.getMonth()), me: lastDay(d.getFullYear(), d.getMonth()) }); }

  // agrupa por projeto
  const byProj = {};
  td.forEach(t => { const p = t.projName || '(sem projeto)'; (byProj[p] = byProj[p] || []).push(t); });
  const order = PROJ_ORDER.filter(p => byProj[p]).concat(Object.keys(byProj).filter(p => !PROJ_ORDER.includes(p)));

  function count(items, memberShort, colIdx){
    return items.filter(t => {
      if (t.member !== memberShort || t.completed) return false;
      const hasStart = !!t.start, hasDue = !!t.due_on;
      if (!hasStart && !hasDue) return false;                 // backlog: fora
      const overdue = hasDue && t.due_on < TODAY;
      if (colIdx === -1) return overdue;                      // coluna Vencidas
      if (overdue) return false;
      const ws = t.start || t.due_on, we = t.due_on || t.start;
      const c = cols[colIdx];
      return ws <= c.me && we >= c.ms;                        // janela atravessa o mês
    }).length;
  }

  let html = '';
  order.forEach(pName => {
    const items = byProj[pName].filter(t => !t.completed);
    const calcCount = items.filter(t => (t.start || t.due_on) && MEMBERS.some(m => m.short===t.member)).length;
    const rows = MEMBERS.filter(m => {
      if (count(items, m.short, -1) > 0) return true;
      for (let i=0;i<cols.length;i++){ if (count(items, m.short, i) > 0) return true; }
      return false;
    });
    if (!rows.length) return;
    html += `<div class="lp-proj"><span class="lp-pname">${escapeHtml(pName)}</span><span class="lp-note">· ${calcCount} itens no cálculo (tarefas + subtarefas)</span></div>`;
    html += `<div class="lp-wrap"><table class="lptable"><thead><tr><th class="lp-resp">Responsável</th><th>Vencidas</th>` + cols.map(c => `<th>${c.label}</th>`).join('') + `</tr></thead><tbody>`;
    rows.forEach(m => {
      html += `<tr><td class="lp-resp">${m.short}</td>`;
      const v = count(items, m.short, -1);
      html += `<td class="${v?'heat-r':''}">${v||'–'}</td>`;
      cols.forEach((c, i) => { const n = count(items, m.short, i); html += `<td class="${heatCls(n)}">${n||'–'}</td>`; });
      html += `</tr>`;
    });
    html += `</tbody></table></div>`;
  });
  if (!html) html = '<div class="empty">Sem itens com datas para projetar.</div>';
  document.getElementById('loadtable').innerHTML = html;
}

// ===== Nova tarefa =====
function openModal(){
  const psel = document.getElementById('f_project');
  psel.innerHTML = PROJECTS.map(p => `<option value="${p.gid}">${escapeHtml(p.name)}</option>`).join('');
  const def = PROJECTS.find(p => p.tab===activeTab); if (def) psel.value = def.gid;
  const asel = document.getElementById('f_assignee');
  asel.innerHTML = MEMBERS.map(m => `<option value="${m.gid}">${m.name}</option>`).join('') + '<option value="me">Eu (Poliana)</option>';
  document.getElementById('f_name').value = '';
  document.getElementById('f_start').value = '';
  document.getElementById('f_due').value = '';
  document.getElementById('f_notes').value = '';
  document.getElementById('f_msg').textContent = '';
  document.getElementById('f_msg').className = 'mmsg';
  document.getElementById('f_save').disabled = false;
  document.getElementById('modal').classList.add('show');
  document.getElementById('f_name').focus();
}
function closeModal(){ document.getElementById('modal').classList.remove('show'); }
document.getElementById('modal').addEventListener('click', e => { if (e.target.id==='modal') closeModal(); });

async function createTask(){
  const msg = document.getElementById('f_msg');
  const name = document.getElementById('f_name').value.trim();
  if (!name){ msg.className='mmsg err2'; msg.textContent='Informe o nome da tarefa.'; return; }
  const projGid = document.getElementById('f_project').value;
  const assignee = document.getElementById('f_assignee').value;
  const startVal = document.getElementById('f_start').value;
  const dueVal = document.getElementById('f_due').value;
  const notes = document.getElementById('f_notes').value.trim();
  if (startVal && dueVal && dueVal < startVal){ msg.className='mmsg err2'; msg.textContent='A data de conclusão não pode ser anterior à de início.'; return; }

  const proj = PROJECTS.find(p => p.gid===projGid);
  const task = { project_id: projGid, name, assignee };
  if (notes) task.notes = notes;
  if (dueVal) task.due_on = dueVal;
  if (startVal){ task.start_on = startVal; if (proj && proj.startCF) task.custom_fields = JSON.stringify({ [proj.startCF]: { date: startVal } }); }

  const btn = document.getElementById('f_save');
  btn.disabled = true; msg.className='mmsg'; msg.textContent='Criando no Asana…';
  try {
    const r = await window.cowork.callMcpTool(CREATE_TOOL, { tasks: [task] });
    if (r.isError) throw new Error(r.content?.[0]?.text || 'Erro ao criar');
    const obj = r.structuredContent ?? JSON.parse(r.content[0].text);
    if (obj.failed && obj.failed.length){ throw new Error(obj.failed[0].error || 'Falha ao criar a tarefa.'); }
    msg.className='mmsg ok2'; msg.textContent='✓ Tarefa criada! Atualizando painel…';
    setTimeout(async () => { closeModal(); await load(); }, 900);
  } catch (e){
    btn.disabled = false; msg.className='mmsg err2'; msg.textContent = 'Erro: ' + e.message;
  }
}
